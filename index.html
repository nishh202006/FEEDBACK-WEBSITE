<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .rating-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .rating-group input[type="radio"] {
            display: none;
        }
        
        .rating-group label {
            margin: 0;
            padding: 10px 15px;
            background: #f0f0f0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: normal;
        }
        
        .rating-group input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .reset-btn {
            background: #f0f0f0;
            color: #333;
        }
        
        .reset-btn:hover {
            background: #e0e0e0;
        }
        
        .success-message {
            display: none;
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .success-message.show {
            display: block;
        }
        
        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Feedback Form</h1>
        <p class="subtitle">Share your valuable feedback with us • No login required</p>
        
        <div class="success-message" id="successMessage">
            ✅ Thank you! Your feedback has been submitted successfully.
        </div>
        
        <form id="feedbackForm">
            <div class="form-group">
                <label for="name">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email">
            </div>
            
            <div class="form-group">
                <label for="category">Category <span class="required">*</span></label>
                <select id="category" name="category" required>
                    <option value="">-- Select a category --</option>
                    <option value="general">General Feedback</option>
                    <option value="bug">Bug Report</option>
                    <option value="feature">Feature Request</option>
                    <option value="improvement">Improvement</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Overall Experience Rating <span class="required">*</span></label>
                <div class="rating-group">
                    <input type="radio" id="rating1" name="rating" value="1" required>
                    <label for="rating1">😞</label>
                    
                    <input type="radio" id="rating2" name="rating" value="2">
                    <label for="rating2">😐</label>
                    
                    <input type="radio" id="rating3" name="rating" value="3">
                    <label for="rating3">😊</label>
                    
                    <input type="radio" id="rating4" name="rating" value="4">
                    <label for="rating4">😄</label>
                    
                    <input type="radio" id="rating5" name="rating" value="5">
                    <label for="rating5">🤩</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="message">Your Feedback <span class="required">*</span></label>
                <textarea id="message" name="message" required placeholder="Please share your detailed feedback..."></textarea>
            </div>
            
            <div class="button-group">
                <button type="submit" class="submit-btn">Submit Feedback</button>
                <button type="reset" class="reset-btn">Clear Form</button>
            </div>
        </form>
    </div>
    
    <script>
        const form = document.getElementById('feedbackForm');
        const successMessage = document.getElementById('successMessage');
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect form data
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                category: document.getElementById('category').value,
                rating: document.querySelector('input[name="rating"]:checked').value,
                message: document.getElementById('message').value,
                timestamp: new Date().toISOString()
            };
            
            // Save to localStorage for demonstration
            let allFeedback = JSON.parse(localStorage.getItem('feedback') || '[]');
            allFeedback.push(formData);
            localStorage.setItem('feedback', JSON.stringify(allFeedback));
            
            // Also try to send to a backend if available
            console.log('Feedback submitted:', formData);
            
            // Show success message
            successMessage.classList.add('show');
            form.reset();
            
            // Hide message after 5 seconds
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 5000);
        });
    </script>
</body>
</html>
